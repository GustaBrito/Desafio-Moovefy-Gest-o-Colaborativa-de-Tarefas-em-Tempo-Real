name: Entrega Continua

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publicar-imagens:
    name: Publicar imagens Docker (GHCR)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login no GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Definir owner normalizado
        id: owner
        run: echo "valor=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Build e push da API
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/src/GerenciadorTarefas.Api/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.owner.outputs.valor }}/gerenciador-tarefas-api:latest
            ghcr.io/${{ steps.owner.outputs.valor }}/gerenciador-tarefas-api:${{ github.sha }}

      - name: Build e push do frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: frontend/Dockerfile
          build-args: |
            VITE_URL_API=/api
          push: true
          tags: |
            ghcr.io/${{ steps.owner.outputs.valor }}/gerenciador-tarefas-frontend:latest
            ghcr.io/${{ steps.owner.outputs.valor }}/gerenciador-tarefas-frontend:${{ github.sha }}
