name: Integracao Continua

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backend:
    name: Backend - Build e Testes
    runs-on: ubuntu-latest
    env:
      TESTES_INTEGRACAO_CONNECTION_STRING_ADMIN: Host=localhost;Port=55433;Database=postgres;Username=postgres;Password=postgres;Pooling=false
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: postgres
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 55433:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
          cache: true
          cache-dependency-path: |
            global.json
            backend/**/*.csproj

      - name: Restaurar dependencias
        run: dotnet restore GerenciadorTarefas.sln

      - name: Compilar solucao
        run: dotnet build GerenciadorTarefas.sln --configuration Release --no-restore

      - name: Executar testes com cobertura
        run: |
          dotnet test tests/GerenciadorTarefas.TestesUnitarios/GerenciadorTarefas.TestesUnitarios.csproj --configuration Release --no-build -m:1 --verbosity minimal --collect:"XPlat Code Coverage" --results-directory ./TestResults
          dotnet test tests/GerenciadorTarefas.TestesIntegracao/GerenciadorTarefas.TestesIntegracao.csproj --configuration Release --no-build -m:1 --verbosity minimal --collect:"XPlat Code Coverage" --results-directory ./TestResults

      - name: Publicar artefatos de teste e cobertura
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: backend/TestResults/**
          if-no-files-found: warn

  frontend:
    name: Frontend - Build e Testes
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependencias
        run: npm ci

      - name: Gerar build
        run: npm run build

      - name: Executar testes com cobertura
        env:
          NODE_OPTIONS: --max-old-space-size=4096
        run: npx vitest run --coverage --maxWorkers=1 --fileParallelism=false --isolate

      - name: Publicar cobertura frontend
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-test-results
          path: |
            frontend/coverage/**
          if-no-files-found: warn
