name: Integracao Continua

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backend:
    name: Backend - Build e Testes
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
          cache: true
          cache-dependency-path: |
            global.json
            backend/**/*.csproj

      - name: Restaurar dependencias
        run: dotnet restore GerenciadorTarefas.sln

      - name: Compilar solucao
        run: dotnet build GerenciadorTarefas.sln --configuration Release --no-restore

      - name: Executar testes
        run: dotnet test GerenciadorTarefas.sln --configuration Release --no-build -m:1 --verbosity minimal

  frontend:
    name: Frontend - Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependencias
        run: npm ci

      - name: Gerar build
        run: npm run build
