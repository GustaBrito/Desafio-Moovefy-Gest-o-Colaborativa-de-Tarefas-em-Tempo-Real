services:
  banco_dados:
    image: postgres:16-alpine
    container_name: gerenciador-tarefas-banco-compose
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-gerenciador_tarefas_dev}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORTA_HOST:-55433}:5432"
    volumes:
      - volume_banco_gerenciador_tarefas:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-gerenciador_tarefas_dev}",
        ]
      interval: 5s
      timeout: 5s
      retries: 12
    restart: unless-stopped
    networks:
      - rede_gerenciador_tarefas

  api:
    build:
      context: .
      dockerfile: backend/src/GerenciadorTarefas.Api/Dockerfile
    container_name: gerenciador-tarefas-api-compose
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Development}
      ASPNETCORE_URLS: http://+:${API_PORTA_CONTAINER:-8080}
      ConnectionStrings__BancoDados: Host=banco_dados;Port=5432;Database=${POSTGRES_DB:-gerenciador_tarefas_dev};Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD:-postgres}
      BancoDados__AplicarMigracoesAutomaticamente: ${BANCO_APLICAR_MIGRACOES_AUTOMATICAMENTE:-true}
      BancoDados__AplicarSeedDadosDemonstracao: ${BANCO_APLICAR_SEED_DEMONSTRACAO:-true}
      AutenticacaoJwt__ChaveSecreta: ${AUTENTICACAO_JWT_CHAVE_SECRETA:-chave-desenvolvimento-local-com-32-caracteres}
    depends_on:
      banco_dados:
        condition: service_healthy
    ports:
      - "${API_PORTA_HOST:-5258}:${API_PORTA_CONTAINER:-8080}"
    restart: unless-stopped
    networks:
      - rede_gerenciador_tarefas

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_URL_API: ${VITE_URL_API:-http://localhost:5258}
    container_name: gerenciador-tarefas-frontend-compose
    depends_on:
      api:
        condition: service_started
    ports:
      - "${FRONTEND_PORTA_HOST:-5173}:80"
    restart: unless-stopped
    networks:
      - rede_gerenciador_tarefas

volumes:
  volume_banco_gerenciador_tarefas:

networks:
  rede_gerenciador_tarefas:
