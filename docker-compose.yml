services:
  banco_dados:
    image: postgres:16-alpine
    container_name: gerenciador-tarefas-banco-compose
    environment:
      POSTGRES_DB: gerenciador_tarefas_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "55433:5432"
    volumes:
      - volume_banco_gerenciador_tarefas:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d gerenciador_tarefas_dev"]
      interval: 5s
      timeout: 5s
      retries: 12

  api:
    build:
      context: .
      dockerfile: backend/src/GerenciadorTarefas.Api/Dockerfile
    container_name: gerenciador-tarefas-api-compose
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__BancoDados: Host=banco_dados;Port=5432;Database=gerenciador_tarefas_dev;Username=postgres;Password=postgres
      BancoDados__AplicarMigracoesAutomaticamente: "true"
    depends_on:
      banco_dados:
        condition: service_healthy
    ports:
      - "5258:8080"
    restart: unless-stopped

volumes:
  volume_banco_gerenciador_tarefas:
